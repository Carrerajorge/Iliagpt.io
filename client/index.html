  <head>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <meta property="og:title" content="IliaGPT" />
    <meta property="og:description" content="AI Agent Platform for autonomous web browsing and document creation." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://replit.com/public/images/opengraph.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@replit" />
    <meta name="twitter:title" content="IliaGPT" />
    <meta name="twitter:description" content="AI Agent Platform for autonomous web browsing and document creation." />
    <meta name="twitter:image" content="https://replit.com/public/images/opengraph.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  </head>
  <body>
    <div id="root">
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;font-family:system-ui,-apple-system,sans-serif;">
        <div style="text-align:center;">
          <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#8b5cf6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
          <div style="color:#a1a1aa;font-size:14px;letter-spacing:0.5px;">IliaGPT</div>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <style>vite-error-overlay{display:none!important}</style>
    <script>
      (function() {
        var originalError = console.error;
        var originalWarn = console.warn;
        function isViteHmrMsg(str) {
          if (!str) return false;
          var s = typeof str === 'string' ? str : String(str);
          return s.indexOf('[vite]') === 0 || (s.indexOf('WebSocket') !== -1 && s.indexOf('vite') !== -1) || s.indexOf('[hmr]') !== -1;
        }
        console.error = function() {
          if (arguments.length && isViteHmrMsg(arguments[0])) return;
          originalError.apply(console, arguments);
        };
        console.warn = function() {
          if (arguments.length && isViteHmrMsg(arguments[0])) return;
          originalWarn.apply(console, arguments);
        };
        window.addEventListener('error', function(e) {
          if (e.message && e.message.indexOf('[vite]') !== -1) {
            e.stopImmediatePropagation();
            e.preventDefault();
            return false;
          }
        }, true);
        new MutationObserver(function(mutations) {
          mutations.forEach(function(m) {
            m.addedNodes.forEach(function(n) {
              if (n.tagName && n.tagName.toLowerCase() === 'vite-error-overlay') {
                n.remove();
              }
            });
          });
        }).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
