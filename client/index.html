  </head>
  <body>
    <div id="root">
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;font-family:system-ui,-apple-system,sans-serif;">
        <div style="text-align:center;">
          <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#8b5cf6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
          <div style="color:#a1a1aa;font-size:14px;letter-spacing:0.5px;">IliaGPT</div>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      (function() {
        var originalError = console.error;
        var originalWarn = console.warn;
        var suppressedPatterns = [
          'vite',
          'websocket',
          'WebSocket',
          'Could not parse CSS stylesheet',
          'adoptedStyleSheets',
          'Cannot read properties of undefined',
          'hmr',
          'HMR'
        ];
        var shouldSuppress = function(args) {
          var msg = args[0];
          if (!msg) return false;
          var str = typeof msg === 'string' ? msg : (msg && msg.message ? msg.message : String(msg));
          var lower = str.toLowerCase();
          return suppressedPatterns.some(function(p) { return lower.includes(p.toLowerCase()); });
        };
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          if (shouldSuppress(args)) return;
          originalError.apply(console, args);
        };
        console.warn = function() {
          var args = Array.prototype.slice.call(arguments);
          if (shouldSuppress(args)) return;
          originalWarn.apply(console, args);
        };
        window.addEventListener('error', function(e) {
          if (e.message && (
            e.message.includes('send') ||
            e.message.includes('WebSocket') ||
            e.message.includes('websocket') ||
            e.message.includes('hmr') ||
            e.message.includes('Cannot read properties of undefined')
          )) {
            e.stopImmediatePropagation();
            e.preventDefault();
            return false;
          }
        }, true);
        window.addEventListener('unhandledrejection', function(e) {
          var msg = e.reason && (e.reason.message || String(e.reason));
          if (msg && (msg.includes('WebSocket') || msg.includes('send') || msg.includes('hmr'))) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
