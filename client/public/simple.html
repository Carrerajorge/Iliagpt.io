<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IliaGPT - Chat Simple</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 20px; background: #111; border-bottom: 1px solid #333; text-align: center; }
    .header h1 { font-size: 24px; color: #3b82f6; }
    .chat-container { flex: 1; max-width: 800px; width: 100%; margin: 0 auto; padding: 20px; overflow-y: auto; }
    .message { padding: 12px 16px; border-radius: 12px; margin-bottom: 12px; max-width: 80%; }
    .user { background: #3b82f6; margin-left: auto; }
    .assistant { background: #222; }
    .input-area { padding: 20px; background: #111; border-top: 1px solid #333; }
    .input-wrapper { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; }
    input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 16px; }
    input:focus { outline: none; border-color: #3b82f6; }
    button { padding: 12px 24px; border-radius: 8px; border: none; background: #3b82f6; color: #fff; font-size: 16px; cursor: pointer; }
    button:hover { background: #2563eb; }
    button:disabled { background: #555; cursor: not-allowed; }
    .thinking { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 IliaGPT - Chat Simple</h1>
    <p style="color: #888; margin-top: 8px;">Versión de emergencia - Chat directo con Grok 3</p>
  </div>
  
  <div class="chat-container" id="messages"></div>
  
  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="input" placeholder="Escribe tu mensaje..." autocomplete="off">
      <button id="send" onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    let isWaiting = false;

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !isWaiting) sendMessage();
    });

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isWaiting) return;

      // Add user message
      addMessage(text, 'user');
      input.value = '';
      
      // Show thinking indicator
      isWaiting = true;
      sendBtn.disabled = true;
      const thinkingId = addMessage('Pensando...', 'thinking');

      try {
        const response = await fetch('/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{ role: 'user', content: text }],
            model: 'grok-3'
          })
        });

        if (!response.ok) {
          throw new Error('Error ' + response.status);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullContent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.content) {
                  fullContent += data.content;
                  updateMessage(thinkingId, fullContent, 'assistant');
                }
              } catch (e) {
                // Ignore parse errors
              }
            }
          }
        }

        if (!fullContent) {
          updateMessage(thinkingId, 'No se recibió respuesta', 'assistant');
        }

      } catch (error) {
        console.error('Error:', error);
        updateMessage(thinkingId, 'Error: ' + error.message, 'assistant');
      }

      isWaiting = false;
      sendBtn.disabled = false;
      input.focus();
    }

    function addMessage(text, type) {
      const id = 'msg-' + Date.now();
      const div = document.createElement('div');
      div.id = id;
      div.className = 'message ' + type;
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return id;
    }

    function updateMessage(id, text, type) {
      const div = document.getElementById(id);
      if (div) {
        div.textContent = text;
        div.className = 'message ' + type;
      }
    }

    input.focus();
  </script>
</body>
</html>
