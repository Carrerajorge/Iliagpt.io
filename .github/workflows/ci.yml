name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  chat-core:
    name: Chat Core Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run stable chat suite
        run: npm run test:ci:chat-core
