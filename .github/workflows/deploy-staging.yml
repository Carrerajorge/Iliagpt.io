# =============================================================================
# IliaGPT — Deploy to Staging
# Triggers on push to main · Builds image · Deploys · Runs smoke tests
# =============================================================================
name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (default: sha of HEAD)"
        required: false
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ENVIRONMENT: staging
  STAGING_URL: https://staging.iliagpt.io

jobs:
  # ── Build & Push Image ───────────────────────────────────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=staging
            type=raw,value=staging-${{ github.run_number }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_NUMBER=${{ github.run_number }}

  # ── Run DB Migrations on Staging ─────────────────────────────────────────────
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-image]
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Run migrations on staging DB
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.run_number }} \
            node dist/index.cjs --migrate-only

  # ── Deploy to Staging ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [migrate]
    environment:
      name: staging
      url: ${{ env.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Deploy new image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-${{ github.run_number }}"
          kubectl set image deployment/iliagpt iliagpt="$IMAGE" \
            -n iliagpt --record
          kubectl rollout status deployment/iliagpt -n iliagpt --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n iliagpt -l app=iliagpt
          kubectl rollout status deployment/iliagpt -n iliagpt

  # ── Smoke Tests ───────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against staging
        env:
          BASE_URL: ${{ env.STAGING_URL }}
          PLAYWRIGHT_BASE_URL: ${{ env.STAGING_URL }}
        run: npm run test:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report-staging-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

  # ── Notify ─────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: always()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "${{ needs.smoke-tests.result == 'success' && '✅' || '❌' }} Staging deploy ${{ needs.smoke-tests.result }} — <${{ env.STAGING_URL }}|staging.iliagpt.io> — run #${{ github.run_number }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
