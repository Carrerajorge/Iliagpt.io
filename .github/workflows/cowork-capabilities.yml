name: Cowork Capability Suite

on:
  push:
    branches:
      - main
    paths:
      - 'cowork_test_suite/**'
      - 'server/services/filePreviewService.ts'
      - 'server/routes/filesRouter.ts'
      - 'server/memory/longTermMemory.ts'
      - 'client/src/hooks/use-stream-chat.ts'
      - 'client/src/components/chat-interface.tsx'
      - '.github/workflows/cowork-capabilities.yml'
  pull_request:
    paths:
      - 'cowork_test_suite/**'
      - 'server/services/filePreviewService.ts'
      - 'server/routes/filesRouter.ts'
      - 'server/memory/longTermMemory.ts'
      - 'client/src/hooks/use-stream-chat.ts'
      - 'client/src/components/chat-interface.tsx'
      - '.github/workflows/cowork-capabilities.yml'
  workflow_dispatch:

jobs:
  offline-suite:
    name: 18 Cowork Capabilities — Offline Suite (9520 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (for matplotlib / pillow)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libjpeg-dev zlib1g-dev libfreetype6-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest==8.2.2 \
            python-docx==1.1.2 \
            openpyxl==3.1.5 \
            python-pptx==0.6.23 \
            reportlab==4.2.2 \
            pypdf==4.3.1 \
            mammoth==1.8.0 \
            matplotlib==3.9.2 \
            markdown2==2.5.0 \
            pillow==10.4.0

      - name: Run offline capability suite
        working-directory: cowork_test_suite/tests_capacidades
        run: |
          pytest -q --maxfail=50 --tb=short --disable-warnings \
            --junitxml=../results.xml

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cowork-capability-results
          path: cowork_test_suite/results.xml
          if-no-files-found: warn

      - name: Upload artifacts (generated files)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cowork-capability-artifacts
          path: cowork_test_suite/tests_capacidades/artifacts/
          if-no-files-found: ignore
