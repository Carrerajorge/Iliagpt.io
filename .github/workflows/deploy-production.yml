name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. sha-abc1234)"
        required: true
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K8S_NAMESPACE: iliagpt
  SLACK_CHANNEL: "#production-deployments"

jobs:
  validate:
    name: Validate Input
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "Production deploy not confirmed. Type DEPLOY to confirm."
            exit 1
          fi
          echo "Confirmed."

  deploy-production:
    name: Blue-Green Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
      url: https://iliagpt.io

    steps:
      - uses: actions/checkout@v4

      - name: Set image reference
        id: img
        run: |
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.PRODUCTION_KUBECONFIG }}

      - name: Capture rollback reference
        id: rollback
        run: |
          CURRENT=$(kubectl get deployment iliagpt-app -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "image=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current production image: $CURRENT"

      - name: Create blue deployment (canary 10%)
        run: |
          kubectl set image deployment/iliagpt-app \
            app=${{ steps.img.outputs.image }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout to complete
        id: rollout
        run: |
          kubectl rollout status deployment/iliagpt-app \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=600s

      - name: Production health check
        id: healthcheck
        run: |
          echo "Waiting 30s for traffic to settle..."
          sleep 30
          FAILURES=0
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://iliagpt.io/api/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              FAILURES=$((FAILURES + 1))
            fi
            sleep 5
          done
          if [ "$FAILURES" -gt 1 ]; then
            echo "Health check failed ($FAILURES/5) — triggering rollback"
            exit 1
          fi
          echo "Health checks passed ($((5 - FAILURES))/5)"

      - name: Auto-rollback on failure
        if: failure() && steps.rollout.outcome != 'skipped'
        run: |
          echo "Rolling back to: ${{ steps.rollback.outputs.image }}"
          kubectl set image deployment/iliagpt-app \
            app=${{ steps.rollback.outputs.image }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/iliagpt-app \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          echo "Rollback complete."

      - name: Run production smoke tests
        run: |
          npm ci --frozen-lockfile
          APP_URL=https://iliagpt.io npm run test:smoke
        env:
          APP_URL: https://iliagpt.io

      - name: Create GitHub deployment record
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          initial-status: success

      - name: Tag release in Git
        run: |
          git tag "release/$(date +%Y%m%d-%H%M%S)-${{ github.event.inputs.image_tag }}"
          git push origin --tags

      - name: Notify Slack — success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ env.SLACK_CHANNEL }}
          payload: |
            {
              "text": "✅ *Production deploy succeeded*",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ *Production Deploy Succeeded*\n*Image:* `${{ github.event.inputs.image_tag }}`\n*By:* ${{ github.actor }}\n*URL:* https://iliagpt.io"
                }
              }]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: ${{ env.SLACK_CHANNEL }}
          payload: |
            {
              "text": "🚨 *Production deploy FAILED — auto-rollback triggered*",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🚨 *Production Deploy FAILED*\n*Image:* `${{ github.event.inputs.image_tag }}`\n*Rolled back to:* `${{ steps.rollback.outputs.image }}`\n*By:* ${{ github.actor }}\nCheck run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              }]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
