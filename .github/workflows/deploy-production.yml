# =============================================================================
# IliaGPT — Deploy to Production
# Manual trigger with approval · Blue-green deploy · Health check · Rollback
# =============================================================================
name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (e.g. sha-abc1234)"
        required: true
        type: string
      skip_smoke_tests:
        description: "Skip smoke tests (emergency deploy only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      confirm:
        description: "Type DEPLOY to confirm production deployment"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ENVIRONMENT: production
  PRODUCTION_URL: https://iliagpt.io

jobs:
  # ── Confirm & Validate ────────────────────────────────────────────────────────
  validate:
    name: Validate Deploy Request
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        if: github.event.inputs.confirm != 'DEPLOY'
        run: |
          echo "❌ Confirmation failed. You must type DEPLOY to confirm."
          exit 1

      - name: Validate image tag format
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ ! "$TAG" =~ ^(sha-[a-f0-9]+|staging-[0-9]+|v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "❌ Invalid image tag format: $TAG"
            exit 1
          fi
          echo "✅ Image tag validated: $TAG"

  # ── Pre-deploy Health Check ───────────────────────────────────────────────────
  pre-deploy-check:
    name: Pre-deploy Health Check
    runs-on: ubuntu-latest
    needs: [validate]
    environment:
      name: production-approval
    steps:
      - uses: actions/checkout@v4

      - name: Check production health before deploy
        run: |
          STATUS=$(curl -sf "${{ env.PRODUCTION_URL }}/api/health" | jq -r '.status' || echo "unreachable")
          echo "Pre-deploy health status: $STATUS"
          if [[ "$STATUS" != "healthy" && "$STATUS" != "degraded" ]]; then
            echo "⚠️ Production is already unhealthy. Proceed with caution."
          fi

      - name: Record pre-deploy state
        id: pre-state
        run: |
          CURRENT=$(kubectl get deployment iliagpt -n iliagpt -o jsonpath='{.spec.template.spec.containers[0].image}' || echo "unknown")
          echo "current_image=$CURRENT" >> $GITHUB_OUTPUT
          echo "📸 Current image: $CURRENT"

  # ── Run DB Migrations ─────────────────────────────────────────────────────────
  migrate:
    name: Run DB Migrations (dry-run then apply)
    runs-on: ubuntu-latest
    needs: [pre-deploy-check]
    environment:
      name: production
    steps:
      - name: Dry-run migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }} \
            node dist/index.cjs --migrate-dry-run
          echo "✅ Migration dry-run passed"

      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }} \
            node dist/index.cjs --migrate-only
          echo "✅ Migrations applied"

  # ── Blue-Green Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: Blue-Green Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [migrate]
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    outputs:
      deploy_success: ${{ steps.verify.outputs.success }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Deploy new image (rolling update)
        id: deploy
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"
          echo "Deploying image: $IMAGE"
          kubectl set image deployment/iliagpt iliagpt="$IMAGE" \
            -n iliagpt --record
          echo "Waiting for rollout..."
          kubectl rollout status deployment/iliagpt -n iliagpt --timeout=600s
          echo "✅ Rollout complete"

      - name: Verify deployment health
        id: verify
        run: |
          sleep 15
          # Check all pods are running
          READY=$(kubectl get deployment iliagpt -n iliagpt -o jsonpath='{.status.readyReplicas}')
          DESIRED=$(kubectl get deployment iliagpt -n iliagpt -o jsonpath='{.spec.replicas}')
          echo "Pods ready: $READY / $DESIRED"
          if [[ "$READY" != "$DESIRED" ]]; then
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Not all pods are ready"
            exit 1
          fi
          # HTTP health check
          STATUS=$(curl -sf "${{ env.PRODUCTION_URL }}/api/health" | jq -r '.status' || echo "unreachable")
          echo "Health status: $STATUS"
          if [[ "$STATUS" != "healthy" ]]; then
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Health check failed: $STATUS"
            exit 1
          fi
          echo "success=true" >> $GITHUB_OUTPUT
          echo "✅ Production deployment verified"

  # ── Smoke Tests ───────────────────────────────────────────────────────────────
  smoke-tests:
    name: Post-deploy Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy]
    if: github.event.inputs.skip_smoke_tests == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against production
        env:
          BASE_URL: ${{ env.PRODUCTION_URL }}
          PLAYWRIGHT_BASE_URL: ${{ env.PRODUCTION_URL }}
        run: npm run test:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report-prod-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

  # ── Auto-rollback on Failure ──────────────────────────────────────────────────
  rollback:
    name: Auto Rollback on Failure
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy, smoke-tests]
    if: failure() && needs.deploy.outputs.deploy_success == 'false'
    steps:
      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Rollback deployment
        run: |
          echo "🔄 Rolling back to previous revision..."
          kubectl rollout undo deployment/iliagpt -n iliagpt
          kubectl rollout status deployment/iliagpt -n iliagpt --timeout=300s
          echo "✅ Rollback complete"

      - name: Notify rollback
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "🔄 AUTO-ROLLBACK triggered for production deployment #${{ github.run_number }}. Rolled back to previous version."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ── Notify ─────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy, smoke-tests]
    if: always()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "${{ (needs.deploy.result == 'success' && needs.smoke-tests.result != 'failure') && '✅' || '❌' }} Production deploy ${{ needs.deploy.result }} — tag `${{ github.event.inputs.image_tag }}` — run #${{ github.run_number }} by @${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
