[pytest]
testpaths = .
python_files = test_cap_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    -q
markers =
    capability: Capability category marker
    subcapability: Sub-capability identifier
    smoke: Minimal smoke tests
    regression: Regression tests
    slow: Tests taking >5 seconds
    integration: External service tests
    security: Security validation tests
    enterprise: Enterprise-tier tests
    file_generation: Document generation tests
    data_science: Analytics and ML tests
    automation: Browser/computer automation tests
    connectors: MCP connector tests
