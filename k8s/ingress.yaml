# =============================================================================
# IliaGPT — Kubernetes Ingress
# TLS termination, rate limiting, CORS, security headers via nginx-ingress
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iliagpt-ingress
  namespace: iliagpt
  labels:
    app.kubernetes.io/name: iliagpt
    app.kubernetes.io/component: ingress
  annotations:
    # ── Ingress class ─────────────────────────────────────────────────────────
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # ── TLS certificate — cert-manager (Let's Encrypt) ────────────────────────
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/acme-challenge-type: http01

    # ── Rate limiting ─────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"

    # ── Request size ─────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/client-max-body-size: "100m"

    # ── Timeouts ─────────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"

    # ── SSE and WebSocket passthrough ─────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"

    # ── CORS ─────────────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://iliagpt.io,https://www.iliagpt.io"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,X-CSRF-Token"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "3600"

    # ── Security headers ─────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - iliagpt.io
        - www.iliagpt.io
        - app.iliagpt.io
      secretName: iliagpt-tls-cert
  rules:
    # ── Main domain ──────────────────────────────────────────────────────────
    - host: iliagpt.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iliagpt-service
                port:
                  name: http
    # ── www redirect handled by service ──────────────────────────────────────
    - host: www.iliagpt.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iliagpt-service
                port:
                  name: http
    # ── App subdomain ─────────────────────────────────────────────────────────
    - host: app.iliagpt.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iliagpt-service
                port:
                  name: http
