apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iliagpt-ingress
  namespace: iliagpt
  labels:
    app: iliagpt
    app.kubernetes.io/component: ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # ── TLS ──────────────────────────────────────────────────────────────────
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # ── Rate limiting ─────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/limit-rpm: "300"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    # ── Timeouts ─────────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # ── Payload ──────────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # ── CORS ─────────────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://iliagpt.io,https://www.iliagpt.io"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRF-Token"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "1728000"
    # ── Security headers ─────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-src 'none';";
    # ── Buffering / compression ───────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/use-gzip: "true"
    nginx.ingress.kubernetes.io/gzip-types: "text/plain text/css application/json application/javascript text/xml application/xml"
    # ── WebSocket (SSE passthrough) ───────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: "iliagpt/websocket-headers"
spec:
  tls:
    - hosts:
        - iliagpt.io
        - www.iliagpt.io
      secretName: iliagpt-tls
  rules:
    - host: iliagpt.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iliagpt-service
                port:
                  name: http
    - host: www.iliagpt.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: iliagpt-service
                port:
                  name: http
---
# ConfigMap for custom WebSocket proxy headers
apiVersion: v1
kind: ConfigMap
metadata:
  name: websocket-headers
  namespace: iliagpt
data:
  Upgrade: "$http_upgrade"
  Connection: "upgrade"
  Host: "$host"
  X-Real-IP: "$remote_addr"
  X-Forwarded-For: "$proxy_add_x_forwarded_for"
  X-Forwarded-Proto: "$scheme"
