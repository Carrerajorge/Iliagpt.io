# =============================================================================
# IliaGPT — Horizontal Pod Autoscaler
# Scales 3–20 pods based on CPU and memory metrics
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iliagpt-hpa
  namespace: iliagpt
  labels:
    app.kubernetes.io/name: iliagpt
    app.kubernetes.io/component: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iliagpt

  minReplicas: 3
  maxReplicas: 20

  metrics:
    # ── CPU utilization ───────────────────────────────────────────────────────
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65    # scale up when avg CPU > 65%

    # ── Memory utilization ────────────────────────────────────────────────────
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75    # scale up when avg memory > 75%

    # ── Custom metric: HTTP requests per second (requires Prometheus adapter)
    # - type: Pods
    #   pods:
    #     metric:
    #       name: http_requests_per_second
    #     target:
    #       type: AverageValue
    #       averageValue: "100"

  behavior:
    # ── Scale up aggressively ─────────────────────────────────────────────────
    scaleUp:
      stabilizationWindowSeconds: 60    # wait 60s before scaling up again
      selectPolicy: Max
      policies:
        - type: Pods
          value: 4                       # add up to 4 pods at a time
          periodSeconds: 60
        - type: Percent
          value: 50                      # or 50% of current replicas
          periodSeconds: 60

    # ── Scale down conservatively ─────────────────────────────────────────────
    scaleDown:
      stabilizationWindowSeconds: 300   # wait 5min before scaling down
      selectPolicy: Min
      policies:
        - type: Pods
          value: 1                       # remove at most 1 pod at a time
          periodSeconds: 120
        - type: Percent
          value: 10                      # or 10% of current replicas
          periodSeconds: 120
