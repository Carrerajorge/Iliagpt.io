apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iliagpt-hpa
  namespace: iliagpt
  labels:
    app: iliagpt
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iliagpt-app

  minReplicas: 3
  maxReplicas: 20

  metrics:
    # ── CPU ───────────────────────────────────────────────────────────────────
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

    # ── Memory ────────────────────────────────────────────────────────────────
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

    # ── Custom metric: active WebSocket connections ────────────────────────────
    - type: Pods
      pods:
        metric:
          name: websocket_connections_active
        target:
          type: AverageValue
          averageValue: "200"

    # ── Custom metric: request queue depth ────────────────────────────────────
    - type: Pods
      pods:
        metric:
          name: http_requests_queue_length
        target:
          type: AverageValue
          averageValue: "50"

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60        # wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2                           # add at most 2 pods per step
          periodSeconds: 60
        - type: Percent
          value: 50                          # or 50% of current replicas
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300       # wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1                           # remove 1 pod per step
          periodSeconds: 120
        - type: Percent
          value: 25                          # or 25% of current replicas
          periodSeconds: 120
      selectPolicy: Min                      # use the most conservative policy
