# =============================================================================
# IliaGPT — Kubernetes Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: iliagpt-service
  namespace: iliagpt
  labels:
    app.kubernetes.io/name: iliagpt
    app.kubernetes.io/component: service
  annotations:
    # AWS NLB annotations (uncomment if using AWS)
    # service.beta.kubernetes.io/aws-load-balancer-type: nlb
    # service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  selector:
    app: iliagpt
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  sessionAffinity: None
---
# ── Headless service for StatefulSet DNS / peer discovery ─────────────────────
apiVersion: v1
kind: Service
metadata:
  name: iliagpt-headless
  namespace: iliagpt
  labels:
    app.kubernetes.io/name: iliagpt
    app.kubernetes.io/component: headless-service
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: iliagpt
  ports:
    - name: http
      port: 5000
      targetPort: http
