# =============================================================================
# IliaGPT — Kubernetes Deployment
# 3 replicas, rolling updates, security context, affinity rules
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iliagpt
  namespace: iliagpt
  labels:
    app.kubernetes.io/name: iliagpt
    app.kubernetes.io/component: app
    app.kubernetes.io/version: "1.0.0"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: iliagpt
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1           # one extra pod during update
      maxUnavailable: 0     # zero downtime
  template:
    metadata:
      labels:
        app: iliagpt
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # ── Service account ──────────────────────────────────────────────────────
      serviceAccountName: iliagpt-sa
      automountServiceAccountToken: false

      # ── Security context (pod level) ─────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # ── Terminate gracefully (90s matches Node drain timeout) ─────────────────
      terminationGracePeriodSeconds: 90

      # ── DNS config ───────────────────────────────────────────────────────────
      dnsConfig:
        options:
          - name: ndots
            value: "2"

      # ── Affinity: spread across nodes and zones ───────────────────────────────
      affinity:
        podAntiAffinity:
          # Prefer different nodes; soft rule so scheduler can still place pods
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - iliagpt
                topologyKey: kubernetes.io/hostname
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - iliagpt
                topologyKey: topology.kubernetes.io/zone

      # ── Tolerations ───────────────────────────────────────────────────────────
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30

      # ── Init containers ──────────────────────────────────────────────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z -w3 $(DB_HOST) $(DB_PORT); do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done
          env:
            - name: DB_HOST
              value: "postgres-service.iliagpt.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

        - name: run-migrations
          image: iliagpt/app:latest
          command: ["node", "dist/index.cjs", "--migrate-only"]
          envFrom:
            - configMapRef:
                name: iliagpt-config
            - secretRef:
                name: iliagpt-secrets
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

      # ── Main container ───────────────────────────────────────────────────────
      containers:
        - name: iliagpt
          image: iliagpt/app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # ── Environment — from ConfigMap and Secret ──────────────────────────
          envFrom:
            - configMapRef:
                name: iliagpt-config
            - secretRef:
                name: iliagpt-secrets

          # ── Resource constraints ─────────────────────────────────────────────
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi

          # ── Security context (container level) ───────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # ── Volume mounts ────────────────────────────────────────────────────
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs

          # ── Liveness probe — if fails, pod is restarted ──────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # ── Readiness probe — if fails, pod is removed from Service endpoints
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Startup probe — gives app time to initialize on first start ───────
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24    # 2 minutes total
            successThreshold: 1

          # ── Lifecycle hooks ──────────────────────────────────────────────────
          lifecycle:
            preStop:
              exec:
                # Drain in-flight requests before shutdown
                command: ["/bin/sh", "-c", "sleep 5"]

      # ── Volumes ──────────────────────────────────────────────────────────────
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: iliagpt-uploads-pvc
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: app-logs
          emptyDir:
            sizeLimit: 1Gi

      # ── Image pull secrets ───────────────────────────────────────────────────
      imagePullSecrets:
        - name: registry-credentials
---
# ── ServiceAccount ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iliagpt-sa
  namespace: iliagpt
  labels:
    app.kubernetes.io/name: iliagpt
automountServiceAccountToken: false
---
# ── PersistentVolumeClaim for uploads ─────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iliagpt-uploads-pvc
  namespace: iliagpt
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
