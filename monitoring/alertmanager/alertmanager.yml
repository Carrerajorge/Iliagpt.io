
global: {}



route:

  receiver: "whatsapp-warning"

  group_by: ["alertname", "instance"]

  group_wait: 10s

  group_interval: 2m

  repeat_interval: 30m



  routes:

    - matchers:

        - severity="critical"

      receiver: "whatsapp-critical"

      group_wait: 5s

      group_interval: 1m

      repeat_interval: 10m



receivers:

  - name: "whatsapp-warning"

    webhook_configs:

      - url: "http://hola-whatsapp-bridge:9106/alertmanager"

        send_resolved: true

        http_config:
             bearer_token_file: /etc/alertmanager/secrets/alertmanager_webhook_token



  - name: "whatsapp-critical"

    webhook_configs:

      - url: "http://hola-whatsapp-bridge:9106/alertmanager"

        send_resolved: true

        http_config:

          bearer_token_file: /etc/alertmanager/secrets/alertmanager_webhook_token
