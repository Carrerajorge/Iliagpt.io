# =============================================================================
# IliaGPT — Prometheus Configuration
# Scrapes: app, postgres-exporter, redis-exporter, node-exporter, cadvisor
# =============================================================================
global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    environment: production
    region: us-east-1
    cluster: iliagpt-prod

# ── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s
      api_version: v2

# ── Alert rules ───────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/alerts.yml
  - /etc/prometheus/rules/recording.yml

# ── Scrape configs ─────────────────────────────────────────────────────────────
scrape_configs:

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── IliaGPT Application ───────────────────────────────────────────────────────
  - job_name: iliagpt-app
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: http
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - iliagpt
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

  # ── PostgreSQL Exporter ───────────────────────────────────────────────────────
  - job_name: postgres
    scrape_interval: 30s
    static_configs:
      - targets:
          - postgres-service.iliagpt.svc.cluster.local:9187
        labels:
          service: postgres
          environment: production
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ── Redis Exporter ────────────────────────────────────────────────────────────
  - job_name: redis
    scrape_interval: 15s
    static_configs:
      - targets:
          - redis-service.iliagpt.svc.cluster.local:9121
        labels:
          service: redis
          environment: production

  # ── Node Exporter (host metrics) ─────────────────────────────────────────────
  - job_name: node-exporter
    scrape_interval: 15s
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.+):10250"
        replacement: "$1:9100"
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # ── cAdvisor (container metrics) ─────────────────────────────────────────────
  - job_name: cadvisor
    scrape_interval: 15s
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

  # ── Kubernetes API server ─────────────────────────────────────────────────────
  - job_name: kubernetes-apiservers
    scrape_interval: 30s
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
            - default
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https
