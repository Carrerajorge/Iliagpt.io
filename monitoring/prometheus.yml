global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: iliagpt-production
    region: us-east-1

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      timeout: 10s

scrape_configs:

  # ── IliaGPT application ──────────────────────────────────────────────────────
  - job_name: iliagpt-app
    honor_labels: true
    metrics_path: /metrics
    scheme: http
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [iliagpt]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ["postgres-service.iliagpt.svc.cluster.local:9187"]
        labels:
          service: postgres
    relabel_configs:
      - target_label: instance
        replacement: postgres-primary

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis-service.iliagpt.svc.cluster.local:9121"]
        labels:
          service: redis

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          service: nginx

  # ── Node exporter (k8s nodes) ─────────────────────────────────────────────────
  - job_name: node-exporter
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

  # ── kube-state-metrics ────────────────────────────────────────────────────────
  - job_name: kube-state-metrics
    static_configs:
      - targets: ["kube-state-metrics.kube-system.svc.cluster.local:8080"]

  # ── cAdvisor ──────────────────────────────────────────────────────────────────
  - job_name: cadvisor
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

  # ── Prometheus itself ─────────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
