worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"referrer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for"}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    reset_timedout_connection on;
    types_hash_max_size 2048;
    server_tokens      off;

    # ── Buffer tuning ─────────────────────────────────────────────────────────
    client_body_buffer_size   16k;
    client_header_buffer_size  4k;
    client_max_body_size       50m;
    large_client_header_buffers 8 16k;
    proxy_buffer_size          16k;
    proxy_buffers              8 32k;
    proxy_busy_buffers_size    64k;

    # ── Timeouts ─────────────────────────────────────────────────────────────
    client_body_timeout    30s;
    client_header_timeout  15s;
    send_timeout           30s;
    proxy_connect_timeout  10s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m      rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=auth:10m     rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=upload:10m   rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=global:20m   rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Connection limit ──────────────────────────────────────────────────────
    limit_conn conn_limit 20;

    # ── SSL settings ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:50m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Upstream: app cluster ─────────────────────────────────────────────────
    upstream iliagpt_app {
        least_conn;
        server app:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name iliagpt.io www.iliagpt.io;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Load security headers
        include /etc/nginx/security-headers.conf;

        # ── Static assets (Vite build) ────────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            proxy_pass http://iliagpt_app;
            proxy_cache_valid 200 7d;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Auth endpoints (strict rate limit) ───────────────────────────────
        location ~ ^/api/auth {
            limit_req zone=auth burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://iliagpt_app;
            include /etc/nginx/proxy_params.conf;
        }

        # ── File upload endpoint ──────────────────────────────────────────────
        location /api/upload {
            limit_req zone=upload burst=5 nodelay;
            client_max_body_size 50m;
            proxy_pass http://iliagpt_app;
            include /etc/nginx/proxy_params.conf;
        }

        # ── SSE / streaming endpoint ──────────────────────────────────────────
        location ~ /messages/stream {
            proxy_pass http://iliagpt_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }

        # ── WebSocket upgrade ─────────────────────────────────────────────────
        location /ws {
            proxy_pass http://iliagpt_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── API ───────────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            limit_req_status 429;
            proxy_pass http://iliagpt_app;
            include /etc/nginx/proxy_params.conf;
        }

        # ── All other requests ────────────────────────────────────────────────
        location / {
            limit_req zone=global burst=200 nodelay;
            proxy_pass http://iliagpt_app;
            include /etc/nginx/proxy_params.conf;
            # SPA fallback
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://iliagpt_app;
            proxy_set_header X-SPA-Fallback "1";
        }

        # ── Health check (no logging) ─────────────────────────────────────────
        location /api/health {
            proxy_pass http://iliagpt_app;
            access_log off;
        }

        # ── Block common attack paths ─────────────────────────────────────────
        location ~* \.(php|asp|aspx|jsp|cgi|sh|bash|pl|py)$ {
            return 444;
        }
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
