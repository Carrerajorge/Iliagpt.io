# =============================================================================
# IliaGPT.io — Nginx Security Headers
# Include in server {} blocks: include /etc/nginx/security-headers.conf;
# =============================================================================

# ── HSTS — enforce HTTPS for 1 year ─────────────────────────────────────────
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ── Prevent clickjacking ──────────────────────────────────────────────────────
add_header X-Frame-Options "SAMEORIGIN" always;

# ── Prevent MIME sniffing ─────────────────────────────────────────────────────
add_header X-Content-Type-Options "nosniff" always;

# ── Enable XSS filter ────────────────────────────────────────────────────────
add_header X-XSS-Protection "1; mode=block" always;

# ── Referrer policy ──────────────────────────────────────────────────────────
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Permissions policy — restrict browser features ───────────────────────────
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), accelerometer=(), gyroscope=()" always;

# ── Content Security Policy ───────────────────────────────────────────────────
add_header Content-Security-Policy "
  default-src 'self';
  script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' data: https://fonts.gstatic.com;
  img-src 'self' data: blob: https:;
  connect-src 'self' wss://iliagpt.io wss://www.iliagpt.io https:;
  media-src 'self' blob:;
  worker-src 'self' blob:;
  frame-src 'none';
  object-src 'none';
  base-uri 'self';
  form-action 'self';
  upgrade-insecure-requests;
" always;

# ── Cross-Origin policies ─────────────────────────────────────────────────────
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Resource-Policy "same-site" always;

# ── Hide server identity ──────────────────────────────────────────────────────
more_clear_headers Server;
more_clear_headers X-Powered-By;
more_clear_headers X-AspNet-Version;
more_clear_headers X-AspNetMvc-Version;
