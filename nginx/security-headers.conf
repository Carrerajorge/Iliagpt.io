# =============================================================================
# IliaGPT — Nginx Security Headers
# Include this snippet in server blocks: include /etc/nginx/snippets/security-headers.conf;
# =============================================================================

# ── HSTS — force HTTPS for 1 year, include subdomains, preload ───────────────
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ── Prevent clickjacking ──────────────────────────────────────────────────────
add_header X-Frame-Options "DENY" always;

# ── Prevent MIME type sniffing ────────────────────────────────────────────────
add_header X-Content-Type-Options "nosniff" always;

# ── XSS protection (legacy browsers) ─────────────────────────────────────────
add_header X-XSS-Protection "1; mode=block" always;

# ── Referrer policy ───────────────────────────────────────────────────────────
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Permissions policy — disable unused browser features ─────────────────────
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), battery=(), magnetometer=(), gyroscope=(), speaker-selection=()" always;

# ── Content-Security-Policy ───────────────────────────────────────────────────
# Adjust 'connect-src' if you add external API calls from the frontend.
# 'unsafe-inline' is required for some inline styles from shadcn/ui and Tailwind.
# Tighten this further by moving inline styles to CSP nonces in production.
add_header Content-Security-Policy "
  default-src 'self';
  script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://cdn.jsdelivr.net;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com data:;
  img-src 'self' data: blob: https:;
  connect-src 'self' wss://iliagpt.io wss://www.iliagpt.io wss://app.iliagpt.io https://api.openai.com https://api.anthropic.com;
  media-src 'self' blob:;
  object-src 'none';
  base-uri 'self';
  form-action 'self';
  frame-ancestors 'none';
  frame-src 'self' https://accounts.google.com;
  worker-src 'self' blob:;
  child-src 'self' blob:;
  manifest-src 'self';
  upgrade-insecure-requests;
" always;

# ── Cross-Origin policies ─────────────────────────────────────────────────────
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# ── Remove server version ─────────────────────────────────────────────────────
server_tokens off;
more_clear_headers Server;
more_clear_headers X-Powered-By;
